name: Feature request
description: Suggest an improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: "What limitation are you hitting today?"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: "How should this work?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Other options you've tried"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: "Screenshots, workflows, fixtures, etc."
    validations:
      required: false
