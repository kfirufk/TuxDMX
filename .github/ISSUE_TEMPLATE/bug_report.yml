name: Bug report
description: Report a reproducible problem
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail to reproduce the issue.

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "Windows 11 23H2 / Ubuntu 24.04 / macOS 15.x"
    validations:
      required: true

  - type: input
    id: dmx_device
    attributes:
      label: DMX interface
      placeholder: "ENTTEC DMX USB Pro / compatible model"
    validations:
      required: true

  - type: input
    id: fixture_template
    attributes:
      label: Fixture/template involved
      placeholder: "Mira Dye (A mode), custom template name, etc."
    validations:
      required: true

  - type: input
    id: retries
    attributes:
      label: DMX retry limit in UI
      placeholder: "10"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start server with ...
        2. Enable music reactive ...
        3. Press Hold: All On ...
        4. Observe disconnect ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant lines from `data/tuxdmx.log` around the failure timestamp.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
        - label: I can still reproduce on latest main branch
          required: false
